name: memorybench-arena
created: 2026-03-15
repo: https://github.com/AffineFoundation/MemoryGym
lang: python
accounts:
  main: ~/.claude
roles:
  lead:
    type: lead
    loop_interval: 20m
    evolution_upgrade_every: 30
    account: main
    scope:
      - .evomesh/blueprint.md
      - .evomesh/status.md
      - .evomesh/roles/*/inbox/
      - docs/
    description: Project lead — strategy, blueprint, role coordination
  executor:
    type: worker
    loop_interval: 10m
    evolution_upgrade_every: 20
    account: main
    scope:
      - memorygym/
      - tests/
      - scripts/
    description: Code executor — feature development, testing, commits
  trainer:
    type: worker
    loop_interval: 20m
    evolution_upgrade_every: 20
    account: main
    scope:
      - memorygym/training/
      - scripts/
    description: RL training — GRPO experiments, training pipeline, reward shaping
git:
  branch: main
  conflict_resolution: auto
  auto_push: true
