name: memorybench-arena
created: 2026-03-15
repo: ""
accounts:
  main: ~/.claude
roles:
  lead:
    type: lead
    loop_interval: 20m
    evolution_upgrade_every: 30
    scope:
      - .evomesh/blueprint.md
      - .evomesh/status.md
      - .evomesh/roles/*/inbox/
      - docs/
    description: 项目总控，审查所有角色，维护战略蓝图
    account: main
  executor:
    type: worker
    loop_interval: 10m
    evolution_upgrade_every: 20
    scope:
      - src/
      - tests/
    description: 代码实现，测试，提交
    account: main
git:
  branch: main
  conflict_resolution: auto
  auto_push: true
